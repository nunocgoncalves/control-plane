apiVersion: platform.iterabase.com/v1alpha1
kind: PermissionPolicy
metadata:
  name: alice
  namespace: default
spec:
  subject:
    kind: user
    key: default/alice
  # Optional per-identity throughput limits the gateway enforces (HOR-326).
  # Absent = unlimited.
  rateLimits:
    rpm: 60
    tpm: 100000
