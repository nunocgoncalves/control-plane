apiVersion: platform.iterabase.com/v1alpha1
kind: ModelBackend
metadata:
  name: qwen3.6-27b
  namespace: default
spec:
  # kind vLLM deploys an internal GPU workload; SGLang is stubbed (HOR-323);
  # external records a base URL (reachability deferred to HOR-307).
  kind: vLLM
  # model is the HuggingFace id vLLM loads via --model.
  model: Qwen/Qwen3.6-27B
  # image defaults to vllm/vllm-openai:latest when empty.
  image: vllm/vllm-openai:latest
  replicas: 1
  # resources default nvidia.com/gpu: "1" when the GPU request is absent.
  # nodeSelector defaults to {nvidia.com/gpu.present: "true"} when empty.
  # extraArgs are appended after the controller-managed
  # --model/--port/--host defaults, e.g. for NVFP4 quantization or an explicit
  # context cap. --port and --host may not be set here (they back the Service +
  # probe contract) and are rejected by the reconciler.
  # extraArgs:
  #   - --quantization
  #   - modelopt
  #   - --max-model-len
  #   - "262144"
