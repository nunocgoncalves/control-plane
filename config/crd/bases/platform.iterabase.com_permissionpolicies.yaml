---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: permissionpolicies.platform.iterabase.com
spec:
  group: platform.iterabase.com
  names:
    kind: PermissionPolicy
    listKind: PermissionPolicyList
    plural: permissionpolicies
    shortNames:
    - pp
    singular: permissionpolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PermissionPolicy declares a permission policy for a subject. The control-plane
          operator materializes it into the Postgres permissions store.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PermissionPolicySpec defines the desired state of a PermissionPolicy: the
              subject it applies to. The control-plane operator materializes it into the
              Postgres permissions store. In v1 (broad-default mode) policy contents are
              stored but not enforced — every linked (active) identity gets all
              capabilities via the permissions.effective_capabilities view; fine-grained
              scopes (PermissionPolicy.scopes) land in deepen-phase.
            properties:
              subject:
                description: subject is the identity or group this policy targets
                  (by kind + key).
                properties:
                  key:
                    description: key is the subject's identity key (e.g. "default/alice").
                    type: string
                  kind:
                    description: kind is the subject's identity kind.
                    enum:
                    - user
                    - group
                    - service_account
                    - workflow
                    type: string
                required:
                - key
                - kind
                type: object
            required:
            - subject
            type: object
          status:
            description: PermissionPolicyStatus is the observed state reported by
              the reconciler.
            properties:
              message:
                description: message surfaces the last reconciliation error. Empty
                  on success.
                type: string
              observedGeneration:
                description: observedGeneration is the generation most recently reconciled.
                format: int64
                type: integer
              policyID:
                description: policyID is the UUID of the materialized policy row.
                type: string
              ready:
                description: ready is true once the policy is materialized in Postgres.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
