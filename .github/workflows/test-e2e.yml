name: E2E Tests

# E2E is manual until the first CRD lands (HOR-245); the suite needs a
# reconcilable resource to exercise. Re-enable push/pull_request then.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run e2e tests
        run: make test-e2e
