# Codegen for the harness RPC contract (HOR-351).
# Generates:
#   - Go stubs   -> internal/harnessrpc/iterabase/harness/v1  (HOR-249 consumes)
#   - TypeScript -> harness/src/gen/iterabase/harness/v1       (the harness server)
# Local protoc plugins (install via `make proto-tools`). Run `make proto`.
version: v2
managed:
  enabled: true
plugins:
  - local: protoc-gen-es
    out: ../harness/src/gen
    opt: target=ts
  - local: protoc-gen-go
    out: ../internal/harnessrpc
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: ../internal/harnessrpc
    opt: paths=source_relative
